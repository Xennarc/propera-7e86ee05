name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-tests:
    name: Tenant Isolation Tests
    runs-on: ubuntu-latest
    
    services:
      supabase:
        image: supabase/postgres:15.1.0.117
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start
        env:
          SUPABASE_DB_PORT: 54322

      - name: Run security tests
        run: npm run test:security
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check RLS Audit
        run: |
          echo "Checking security_rls_audit view for issues..."
          result=$(supabase db query "SELECT COUNT(*) as count FROM security_rls_audit WHERE issue_type IN ('RLS_DISABLED', 'NO_POLICIES')" --csv | tail -1)
          if [ "$result" != "0" ]; then
            echo "❌ Security audit found critical issues!"
            supabase db query "SELECT * FROM security_rls_audit ORDER BY issue_type"
            exit 1
          fi
          echo "✅ No critical security issues found"

  lint-security:
    name: Security Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          # Check for common secret patterns (excluding test files)
          if grep -rE "(api[_-]?key|secret|password|token)\s*[:=]\s*['\"][^'\"]{8,}['\"]" \
             --include="*.ts" --include="*.tsx" --include="*.js" \
             --exclude-dir=node_modules --exclude-dir=__tests__ \
             --exclude="*.test.*" --exclude="*.spec.*" .; then
            echo "⚠️ Potential hardcoded secrets found. Please review."
            # Don't fail for now, just warn
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

      - name: Check for dangerous patterns
        run: |
          echo "Checking for dangerous code patterns..."
          # Check for dangerouslySetInnerHTML usage
          dangerous_count=$(grep -r "dangerouslySetInnerHTML" --include="*.tsx" --include="*.jsx" \
            --exclude-dir=node_modules | wc -l || echo "0")
          if [ "$dangerous_count" -gt "0" ]; then
            echo "⚠️ Found $dangerous_count uses of dangerouslySetInnerHTML - ensure these are sanitized"
          fi
          
          # Check for eval usage
          if grep -rE "\beval\s*\(" --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules .; then
            echo "❌ Found eval() usage - this is a security risk"
            exit 1
          fi
          echo "✅ No dangerous eval() patterns found"
