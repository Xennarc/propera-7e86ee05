<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>Propera | Resort Activity Booking & Operations Platform</title>
    <meta name="description" content="Propera is the leading multi-resort booking and operations platform for luxury resorts worldwide. Real-time activity bookings, restaurant reservations, guest portal, and staff console.">
    <meta name="keywords" content="resort booking, resort activity booking system, guest portal, staff console, multi-resort platform, resort operations, restaurant reservations, resort management software">
    <meta name="author" content="Propera" />
    
    <!-- Language -->
    <meta http-equiv="content-language" content="en" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://propera.cc/" />

    <!-- Preconnect to font origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://storage.googleapis.com">
    
    <!-- Non-blocking font loading - Plus Jakarta Sans (primary) + Sora (fallback) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap"></noscript>
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Propera" />
    <meta property="og:title" content="Propera | Resort Activity Booking & Operations Platform">
    <meta property="og:description" content="Propera is the leading multi-resort booking and operations platform for luxury resorts worldwide. Real-time activity bookings, restaurant reservations, guest portal, and staff console.">
    <meta property="og:url" content="https://propera.cc/" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/Pw9i6gy3BsNxT8hWRoiXMNSzcZh1/social-images/social-1765043952873-propera-logo-mark-512.png">
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@properaapp" />
    <meta name="twitter:title" content="Propera | Resort Activity Booking & Operations Platform">
    <meta name="twitter:description" content="Propera is the leading multi-resort booking and operations platform for luxury resorts worldwide. Real-time activity bookings, restaurant reservations, guest portal, and staff console.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/Pw9i6gy3BsNxT8hWRoiXMNSzcZh1/social-images/social-1765043952873-propera-logo-mark-512.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://storage.googleapis.com/gpt-engineer-file-uploads/Pw9i6gy3BsNxT8hWRoiXMNSzcZh1/uploads/1765043941172-propera-logo-mark-512.png">
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <!-- Theme color for mobile browsers - Modern Professional palette -->
    <meta name="theme-color" content="#0B0E14" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
    
    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Propera",
      "url": "https://propera.cc",
      "description": "Multi-resort booking and operations platform for luxury resorts worldwide",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://propera.cc/guest/find?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Propera",
      "url": "https://propera.cc",
      "logo": "https://storage.googleapis.com/gpt-engineer-file-uploads/Pw9i6gy3BsNxT8hWRoiXMNSzcZh1/uploads/1765043941172-propera-logo-mark-512.png",
      "description": "Leading multi-resort booking and operations platform for luxury resorts worldwide",
      "sameAs": [
        "https://twitter.com/properaapp"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Chinese"]
      }
    }
    </script>
    
    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Propera",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Multi-resort booking and operations platform for luxury resorts featuring guest portal, staff console, activity booking, and restaurant reservations",
      "offers": {
        "@type": "Offer",
        "category": "Resort Management Software"
      },
      "featureList": [
        "Real-time activity booking",
        "Restaurant reservations",
        "Guest self-service portal",
        "Staff operations console",
        "Multi-resort management",
        "Analytics and reporting"
      ]
    }
    </script>
    <!-- Critical CSS for initial paint - prevents flash of unstyled content -->
    <style>
      /* Critical styles for immediate render - Modern Professional */
      :root { 
        --background: 220 20% 98%; 
        --foreground: 220 29% 6%;
        --primary: 235 86% 65%;
        --muted: 220 15% 94%;
        --border: 220 15% 85%;
        --radius: 0.75rem;
        color-scheme: light;
      }
      .dark { 
        --background: 220 29% 6%; 
        --foreground: 213 56% 97%;
        --primary: 77 100% 59%;
        --muted: 215 22% 15%;
        --border: 215 20% 20%;
        color-scheme: dark;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
      body { 
        background-color: hsl(var(--background)); 
        color: hsl(var(--foreground));
        font-family: 'Plus Jakarta Sans', 'Sora', system-ui, -apple-system, sans-serif;
        line-height: 1.5;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      /* Critical utility classes for initial render */
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .min-h-screen { min-height: 100vh; }
      .min-h-\[50vh\] { min-height: 50vh; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .bg-background { background-color: hsl(var(--background)); }
      .text-foreground { color: hsl(var(--foreground)); }
      /* Loading animation for Suspense fallback */
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }
      /* Hide content until CSS loads */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
